server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Always serve the freshest HTML so cache-busted ?v=... refs in
    # index.html take effect on every deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # Modern ES modules — explicitly serve .mjs as JavaScript so
    # <script type="module" src="...mjs"> works. The nginx-alpine image's
    # default mime.types maps .mjs to application/octet-stream, which
    # makes browsers refuse to load the module with:
    #   "Failed to load module script: Expected a JavaScript-or-Wasm
    #    module script but the server responded with MIME type
    #    application/octet-stream."
    # The `types { }` empty block + `default_type` force a single
    # Content-Type for .mjs without touching the inherited mime map
    # used by every other extension. The cache header below is the same
    # one applied to .js so .mjs files behave identically.
    location ~* \.mjs$ {
        types { } default_type application/javascript;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    # Static JS/CSS/images: short cache, must-revalidate so versioned
    # query strings (?v=...) flush old assets reliably. The .mjs block
    # above wins for .mjs requests because it matches more specifically.
    location ~* \.(?:js|mjs|css|svg|png|jpg|jpeg|gif|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
