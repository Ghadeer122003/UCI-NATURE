<!-- Pre-bind no-op stubs for login button handlers. The real implementations
     are wired by ui/src/bootstrap/windowBindings.js as soon as main.js runs.
     This guard prevents "startGoogleSignIn is not defined" / "continueWithoutGoogleDrive
     is not defined" if a user clicks before the module bundle finishes loading
     (slow connection, browser still parsing modules, stale cache, etc.). -->
<script>
  (function () {
    var queued = [];
    function defer(name) {
      if (typeof window[name] === "function") return;
      window[name] = function () {
        queued.push({ name: name, args: Array.prototype.slice.call(arguments) });
        console.warn("[uci-nature] " + name + "() invoked before bindings ready; queued.");
      };
    }
    [
      "startGoogleSignIn",
      "continueWithoutGoogleDrive",
      "goToStep2",
      "selectProject",
      "confirmDrive",
      "switchAccount",
      "openDriveModal",
      "reconnectDrive",
      "showPage",
      "closeConfirmModal",
      "confirmModalOK"
    ].forEach(defer);
    window.__uciNatureFlushDeferred = function () {
      while (queued.length) {
        var item = queued.shift();
        try { if (typeof window[item.name] === "function") window[item.name].apply(null, item.args); }
        catch (err) { console.error("[uci-nature] flush " + item.name + " failed", err); }
      }
    };
  })();
</script>
