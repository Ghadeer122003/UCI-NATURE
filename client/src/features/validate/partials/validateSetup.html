<!-- Validate setup markup for time-correction tools. -->
<div class="val-summary-strip">
  <div class="val-summary-card total"><div class="val-summary-val" id="val-total">--</div><div class="val-summary-lbl">Total Records</div></div>
  <div class="val-summary-card valid"><div class="val-summary-val" id="val-valid">--</div><div class="val-summary-lbl">Valid</div></div>
  <div class="val-summary-card warning"><div class="val-summary-val" id="val-warnings">--</div><div class="val-summary-lbl">Warnings</div></div>
  <div class="val-summary-card error"><div class="val-summary-val" id="val-errors">--</div><div class="val-summary-lbl">Errors</div></div>
</div>

<div class="card card-p" style="margin-bottom:14px">
  <div style="margin-bottom:16px">
    <div class="card-title" style="margin-bottom:2px">Batch Time Correction</div>
    <div style="font-size:12px;color:var(--muted)">Correct camera clock drift by shifting timestamps</div>
  </div>

  <!-- Current data date info -->
  <div id="current-date-info" style="display:none;background:#F7FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:13px">
    <div style="color:var(--muted);margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:0.05em">Current image timestamps</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-weight:600;color:#1A202C" id="current-date-folder">—</span>
      <span style="color:var(--muted)">·</span>
      <span style="color:#2D3748">Earliest date: <strong id="current-date-value">—</strong></span>
      <span style="color:var(--muted)">·</span>
      <span style="color:#2D3748">Time: <strong id="current-time-value">—</strong></span>
    </div>
  </div>

  <!-- Offset fields -->
  <div style="margin-bottom:16px">
    <label class="field-label" style="margin-bottom:8px;display:block">Time Offset</label>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">Years</div>
        <input type="number" class="val-date-input" id="offset-years" value="0" style="width:100%;font-variant-numeric:tabular-nums" oninput="updateTimePreviewMulti()">
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">Months</div>
        <input type="number" class="val-date-input" id="offset-months" value="0" min="-11" max="11" style="width:100%;font-variant-numeric:tabular-nums" oninput="updateTimePreviewMulti()">
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">Days</div>
        <input type="number" class="val-date-input" id="offset-days" value="0" style="width:100%;font-variant-numeric:tabular-nums" oninput="updateTimePreviewMulti()">
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em">Hours</div>
        <input type="number" class="val-date-input" id="offset-input" value="0" style="width:100%;font-variant-numeric:tabular-nums" oninput="updateTimePreviewMulti()">
      </div>
    </div>
  </div>

  <!-- Preview -->
  <div style="margin-bottom:16px">
    <label class="field-label" style="margin-bottom:8px;display:block">Preview</label>
    <div class="val-preview-box">
      <div class="val-preview-before" id="time-preview-before">Before: — —</div>
      <div class="val-preview-after" id="time-preview-after">After:  — —</div>
    </div>
  </div>

  <div class="val-correction-btns">
    <button class="val-run-btn" id="apply-correction-btn" style="font-size:13px;padding:9px 18px" onclick="applyTimeCorrection()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Apply Correction
    </button>
    <button class="btn btn-outline btn-sm" id="preview-correction-btn" onclick="previewTimeCorrection()">Preview Changes</button>
  </div>
</div>

<!-- Time Correction Preview Modal -->
<div id="time-preview-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:24px;width:700px;max-height:80vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <strong style="font-size:16px;color:#1A202C">Time Correction Preview</strong>
      <button onclick="document.getElementById('time-preview-modal').style.display='none'" style="border:none;background:none;font-size:20px;cursor:pointer;color:#718096">&#215;</button>
    </div>
    <div id="time-preview-modal-body">Loading...</div>
  </div>
</div>
