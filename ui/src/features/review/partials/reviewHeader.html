<!-- Review header markup for progress, filters, and queue controls. -->
<div class="review-progress-bar-wrap"><div class="review-progress-bar-fill" style="width:27.6%"></div></div>

<div class="review-topbar">
  <div class="review-topbar-left">
    <span class="review-stat-chip blue">247 / 892 reviewed</span>
    <span class="review-stat-chip gray">645 remaining</span>
    <div class="rfilter-group">
      <span class="rfilter-chip active" onclick="setRFilter(this,'all')">All</span>
      <span class="rfilter-chip" onclick="setRFilter(this,'pending')">Pending</span>
      <span class="rfilter-chip" onclick="setRFilter(this,'confirmed')">Confirmed</span>
      <span class="rfilter-chip" onclick="setRFilter(this,'flagged')">Flagged</span>
    </div>
  </div>
  <div class="review-topbar-right">
    <span class="review-human-chip" id="human-chip" onclick="toggleHumanFilter(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>312 Human Detections</span>
    <button class="review-filter-btn" id="sort-btn" onclick="toggleSort(this)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>Low confidence first</button>
    <div class="toggle-wrap"><label class="toggle"><input type="checkbox" id="burst-toggle" checked onchange="toggleBurstView()"><span class="toggle-slider"></span></label><span class="toggle-label" style="font-size:12.5px">Burst Groups</span></div>
  </div>
</div>
